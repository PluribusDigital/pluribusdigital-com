<div class="col-lg-3 col-md-6 px-0 mb-4">
  <div class="card pd-icon-card pd-corner-{{include.corner}}">
    <div class="card-body text-left p-0 px-md-3 py-md-3">
      <div class="d-md-flex text-center pd-icon-card-title">
        <div class="my-auto px-2" >
          <img
            src="/{{include.icon_path}}"
            style="height: 50px; width: 50px"
            alt="{{include.icon_alt}}" 
          />
        </div>
        <div class="my-auto ml-3">
          <h4 class="card-title my-2 my-md-auto">
            {{include.title}}
          </h4>
        </div>
      </div>
      <div class="px-3">
      <p class="card-text mt-0 mt-md-2">
        {{include.text}}
      </p>
      </div>
    </div>
  </div>
</div>
